<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 9</title>
</head>
<body>
    <h1>Exercicio 9</h1>
        <h2>Enunciado:</h2>
        <p>9 - Escreva um algoritmo para imprimir os 10 primeiros números inteiros maiores que 100.</p>

    <script>
        let contador = 0;
        let num = 101;

        document.write("Os 10 primeiros números inteiros maiores que 100 são:<br>");

        while (contador < 10) {
            document.write(num + "<br>");
            num++;
            contador++;
        }
    </script>
</body>
</html>
