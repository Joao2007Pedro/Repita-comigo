<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 8</title>
</head>
<body>
        <h1>Exercicio 8</h1>
        <h2>Enunciado:</h2>
        <p>8 - Ler um valor N e imprimir todos os valores inteiros entre 1 (inclusive) e N (inclusive). 
            Considere que o N será sempre maior que ZERO. N  é um valor informado pelo usuário</p>

        <script>
            let N = parseInt(prompt("Digite um valor N (maior que zero):"));

            while (N <= 0) {
                alert("Valor inválido. Digite um valor maior que zero.");
                N = parseInt(prompt("Digite um valor N (maior que zero):"));
            }

            document.write("Valores inteiros entre 1 e " + N + ":<br>");

            for (let i = 1; i <= N; i++) {
                document.write(i + "<br>");
            }


        </script>
    
</body>
</html>
