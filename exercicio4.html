<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 4</title>
</head>
<body>
     <h1>Exercicio 4</h1>
        <h2>Enunciado:</h2>
        <p>4 - Faça um algoritmo que calcule e escreva a média aritmética dos números inteiros entre 15 (inclusive) e 100 (inclusive).</p>

        <script>
            let soma = 0;
            let contador = 0;

            for (let i = 15; i <= 100; i++) {
                soma += i;
                contador++;
            }

            let media = soma / contador;
            document.write("A média aritmética dos números inteiros entre 15 e 100 é: " + media.toFixed(2));
        </script>
</body>
</html>
