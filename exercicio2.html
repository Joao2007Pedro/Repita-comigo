<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
     <h1>Exercicio 2</h1>
        <h2>Enunciado:</h2>
        <p>2 - Crie uma bomba relógio (usando somente código - para deixar claro!) cuja contagem regressiva vá de 30 a 0. Utilize 
            "document.write" para escrever em tela e no final da repetição escreva "EXPLOSÃO".</p>

        <script>
            let contagem = 30;

            while (contagem >= 0) {
                document.write(contagem + "<br>");
                contagem--;
            }
            document.write("<br>EXPLOSÃO");

        </script>
</body>
</html>
