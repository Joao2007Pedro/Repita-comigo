<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 11</title>
</head>
<body>
    <h1>Exercicio 11</h1>
    <h2>Enunciado:</h2>
    <p>11 - Escreva um programa em que o usuário informe 10 valores e escreva quantos desses valores lidos estão 
        entre os números 24 e 42 (incluindo os valores 24 e 42) e quantos deles estão fora deste intervalo.</p>

    <script>
       let entre24e42 = 0;
       let foraIntervalo = 0;

       for (let i = 1; i <= 10; i++) {
           let valor = parseFloat(prompt("Digite o valor " + i + ":"));

           if (valor >= 24 && valor <= 42) {
               entre24e42++;
           } else {
               foraIntervalo++;
           }
       }
        document.write("Quantidade de valores entre 24 e 42 (inclusive): " + entre24e42 + "<br>");
        document.write("Quantidade de valores fora do intervalo: " + foraIntervalo);
    </script>
</body>
</html>
